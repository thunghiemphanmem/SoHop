<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sổ Hội Họp Thông Minh</title>
  
  <script src="ketnoi.js"></script>

  <style>
    :root {
      --primary: #0284c7; 
      --secondary: #475569; 
      --success: #059669;
      --bg: #e2e8f0;
      --card: #ffffff;
      --text: #1e293b;
      --border: #cbd5e1;
    }
    
    /* Ép sát lề trình duyệt, loại bỏ padding thừa của body */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }
    
    /* Mở rộng không gian làm việc dọc và ngang */
    .container {
      background: var(--card);
      width: 100%;
      max-width: 1000px; /* Giãn rộng khung */
      min-height: 100vh;
      padding: 0 2rem 2rem 2rem;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      box-sizing: border-box;
    }
    
    /* Cố định Header lên đầu trang (Sticky) */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(8px);
      text-align: center;
      padding: 10px 0;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--primary);
    }
    .header img { width: 50px; height: auto; margin-bottom: 5px; }
    .header h2 { margin: 0; color: #334155; font-size: 0.95rem; }
    .header h1 { margin: 2px 0 0 0; color: var(--primary); font-size: 1.4rem; }
    
    /* Giảm vùng đệm giữa các ô nhập liệu */
    .form-group { margin-bottom: 0.8rem; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.95rem; }
    input, textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    
    /* Mở rộng tối đa chiều cao khung nhập nội dung */
    textarea { height: 280px; resize: vertical; line-height: 1.5; }
    
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 1rem;
    }
    .action-grid-full {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .btn-reformat { background-color: var(--secondary); }
    .btn-reformat:hover:not(:disabled) { background-color: #334155; }
    
    .btn-draft { background-color: #0d9488; }
    .btn-draft:hover:not(:disabled) { background-color: #0f766e; }
    
    .btn-generate { background-color: var(--primary); font-size: 1.1rem; padding: 0.85rem; }
    .btn-generate:hover:not(:disabled) { background-color: #0369a1; }
    
    .btn-reset { background-color: transparent; border: 2px solid var(--secondary); color: var(--secondary); }
    .btn-reset:hover:not(:disabled) { background-color: #f1f5f9; }
    
    #statusBox {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      display: none;
    }
    .status-loading { background-color: #e0f2fe; color: #0284c7; }
    .status-success { background-color: #dcfce7; color: #166534; }
    .status-error { background-color: #fee2e2; color: #991b1b; }

    /* Khối giao diện Tìm kiếm */
    .divider {
      margin: 1.5rem 0 1rem 0;
      border-top: 2px dashed var(--border);
      position: relative;
    }
    .divider::after {
      content: "TRA CỨU TRONG SỔ";
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      padding: 0 10px;
      color: var(--secondary);
      font-weight: bold;
      font-size: 0.85rem;
    }
    .search-flex { display: flex; gap: 10px; }
    .search-flex input { flex-grow: 1; }
    .btn-search { background-color: #f59e0b; width: auto; padding: 0 1.5rem; }
    .btn-search:hover:not(:disabled) { background-color: #d97706; }
    
    .search-results {
      margin-top: 0.5rem;
      list-style: none;
      padding: 0;
      max-height: 200px;
      overflow-y: auto;
    }
    .result-item {
      padding: 0.6rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item a { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
    .result-item a:hover { text-decoration: underline; color: #0369a1; }
    .result-date { font-size: 0.85rem; color: #64748b; }

  </style>
</head>
<body>

  <div class="container">
    <div class="header" id="headerArea"></div>
    
    <div class="form-group">
      <label>1. Chủ đề / Tên cuộc họp:</label>
      <input type="text" id="meetingTitle" placeholder="Ví dụ: Giao ban chuyên môn..." required>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>2. Thời gian:</label>
        <input type="datetime-local" id="meetingDate" required>
      </div>
      <div class="form-group">
        <label>3. Địa điểm:</label>
        <input type="text" id="location" placeholder="Phòng hội đồng, phòng họp số 1..." required>
      </div>
    </div>

    <div class="form-group">
      <label>4. Thành phần tham dự:</label>
      <input type="text" id="attendees" placeholder="Ban giám hiệu, toàn thể giáo viên..." required>
    </div>
    
    <div class="form-group">
      <label>Nội dung diễn biến (Khung nhập thô):</label>
      <textarea id="rawContent" placeholder="Ghi chép nhanh các ý kiến thảo luận tại đây..."></textarea>
    </div>

    <div class="action-grid">
      <button id="btnReformat" class="btn-reformat" onclick="processAction('reformat')">Tạo lại bố cục nội dung</button>
      <button id="btnDraft" class="btn-draft" onclick="processAction('draft')">Dự thảo Kết luận</button>
    </div>
    
    <div class="action-grid-full">
      <button id="btnGenerate" class="btn-generate" onclick="processAction('generate')">Lưu Trữ & Ghi Nối Tiếp Vào Sổ</button>
      <button id="btnReset" class="btn-reset" onclick="resetMeeting()">Chuyển cuộc họp mới (Xóa Form)</button>
    </div>
    
    <div id="statusBox"></div>

    <div class="divider"></div>
    <div class="form-group search-flex">
      <input type="text" id="searchKeyword" placeholder="Nhập từ khóa nội dung cần tìm trong Sổ..." onkeypress="handleSearchEnter(event)">
      <button id="btnSearch" class="btn-search" onclick="searchMeetingData()">Tìm kiếm</button>
    </div>
    
    <ul id="searchResults" class="search-results"></ul>

  </div>

  <script>
    window.searchResultsData = [];

    window.onload = function() {
      document.getElementById('headerArea').innerHTML = `
        <img src="${KET_NOI.LOGO_TRUONG}" alt="Logo">
        <h2>${KET_NOI.TEN_TO_CHUC}</h2>
        <h1>${KET_NOI.TIEU_DE_PHAN_MEM}</h1>
      `;
      setNow();
    };

    function setNow() {
      var now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('meetingDate').value = now.toISOString().slice(0,16);
    }

    function resetMeeting() {
      if(confirm("Xóa toàn bộ nội dung hiện tại để nhập biên bản mới?")) {
        document.getElementById('meetingTitle').value = '';
        document.getElementById('location').value = '';
        document.getElementById('attendees').value = '';
        document.getElementById('rawContent').value = '';
        document.getElementById('statusBox').style.display = 'none';
        setNow();
      }
    }

    function toggleButtons(state) {
      document.getElementById('btnReformat').disabled = state;
      document.getElementById('btnDraft').disabled = state;
      document.getElementById('btnGenerate').disabled = state;
      document.getElementById('btnReset').disabled = state;
      document.getElementById('btnSearch').disabled = state;
    }

    async function processAction(actionType) {
      const rawContentField = document.getElementById('rawContent');
      const statusBox = document.getElementById('statusBox');
      
      const payload = {
        action: actionType,
        title: document.getElementById('meetingTitle').value,
        date: document.getElementById('meetingDate').value,
        location: document.getElementById('location').value, // Nạp biến địa điểm
        attendees: document.getElementById('attendees').value,
        rawContent: rawContentField.value,
        appName: KET_NOI.TIEU_DE_PHAN_MEM,
        orgName: KET_NOI.TEN_TO_CHUC,
        accountOperator: KET_NOI.CAN_BO_THAO_TAC
      };

      if(!payload.rawContent) {
        alert('Vui lòng nhập nội dung trước khi thực hiện thao tác!'); return;
      }

      if(actionType === 'generate' && (!payload.title || !payload.location)) {
        alert('Vui lòng nhập đủ Chủ đề và Địa điểm cuộc họp để lưu sổ!'); return;
      }

      toggleButtons(true);
      statusBox.style.display = 'block';
      statusBox.className = 'status-loading';
      
      if(actionType === 'generate') statusBox.innerHTML = 'Đang nạp dữ liệu ghi nối tiếp vào Sổ Hội Họp...';
      else statusBox.innerHTML = 'Trợ lý AI đang đọc và xử lý văn bản...';

      try {
        const response = await fetch(KET_NOI.URL_API_BACKEND, {
          method: 'POST', redirect: 'follow', 
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if(result.status === 'success_doc') {
          statusBox.className = 'status-success';
          statusBox.innerHTML = `${result.message} <br><br> <a href="${result.url}" target="_blank" style="color:#166534; text-decoration:underline;">Mở Sổ Trực Tuyến</a>`;
        } else if (result.status === 'success_text') {
          statusBox.className = 'status-success';
          statusBox.innerHTML = 'AI đã xử lý xong. Vui lòng kiểm tra lại.';
          if(actionType === 'reformat') rawContentField.value = result.text;
          else if (actionType === 'draft') rawContentField.value += result.text;
        } else {
          statusBox.className = 'status-error';
          statusBox.innerHTML = `Lỗi: ${result.message}`;
        }
      } catch (error) {
        statusBox.className = 'status-error';
        statusBox.innerHTML = `Lỗi kết nối API. Chi tiết: ${error}`;
      } finally {
        toggleButtons(false);
      }
    }

    function handleSearchEnter(event) { if (event.key === "Enter") searchMeetingData(); }

    async function searchMeetingData() {
      const keyword = document.getElementById('searchKeyword').value;
      const resultList = document.getElementById('searchResults');
      
      if(!keyword.trim()) { alert('Vui lòng nhập từ khóa!'); return; }

      resultList.innerHTML = '<li class="result-item" style="justify-content:center; color:var(--primary);">Đang quét nội dung Sổ Hội Họp...</li>';
      toggleButtons(true);

      const payload = { action: 'search', keyword: keyword };

      try {
        const response = await fetch(KET_NOI.URL_API_BACKEND, {
          method: 'POST', redirect: 'follow',
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if(result.status === 'success_search') {
          resultList.innerHTML = '';
          if(result.data.length === 0) {
            resultList.innerHTML = '<li class="result-item" style="justify-content:center; color:var(--secondary);">Không tìm thấy nội dung phù hợp.</li>';
          } else {
            window.searchResultsData = result.data;
            result.data.forEach((item, index) => {
              const li = document.createElement('li');
              li.className = 'result-item';
              li.innerHTML = `
                <a href="javascript:void(0)" onclick="extractToForm(${index})">🔍 ${item.title}</a>
                <span class="result-date">${item.date} (Click để nạp)</span>
              `;
              resultList.appendChild(li);
            });
          }
        } else {
          resultList.innerHTML = `<li class="result-item" style="color:red;">Lỗi tra cứu: ${result.message}</li>`;
        }
      } catch (error) {
        resultList.innerHTML = `<li class="result-item" style="color:red;">Lỗi kết nối máy chủ.</li>`;
      } finally {
        toggleButtons(false);
      }
    }
    
    function extractToForm(index) {
      if(window.searchResultsData && window.searchResultsData[index]) {
        const dataBlock = window.searchResultsData[index];
        document.getElementById('rawContent').value = dataBlock.content;
        
        const statusBox = document.getElementById('statusBox');
        statusBox.className = 'status-success';
        statusBox.innerHTML = 'Đã trích xuất biên bản lên khung nhập!';
        statusBox.style.display = 'block';
        
        document.getElementById('rawContent').scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }
  </script>
</body>
</html>
