<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Hội Họp Thông Minh</title>
    <script src="ketnoi.js"></script>
    <style>
        :root {
            --primary: #0284c7;
            --secondary: #475569;
            --bg: #e2e8f0;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card);
            width: 100%;
            max-width: 98%;
            min-height: 100vh;
            padding: 0 10px 20px 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            text-align: center;
            padding: 5px 0;
            margin-bottom: 5px;
            border-bottom: 2px solid var(--primary);
        }
        .header img {
            width: 40px;
            height: auto;
        }
        .header h1 {
            margin: 0;
            color: var(--primary);
            font-size: 1.2rem;
        }
        .header h2 { display: none; }
        
        /* NÂNG CẤP 1: Lưới hiển thị siêu gọn cho 4 trường thông tin đầu tiên */
        .compact-header-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 10px;
            margin-bottom: 8px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 0; 
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 2px;
            color: #334155;
        }
        input, textarea {
            width: 100%;
            padding: 0.4rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        /* NÂNG CẤP 1: Khung nội dung chính lấy lại được chiều cao tối đa */
        .content-group {
            margin-bottom: 5px;
        }
        textarea {
            height: calc(100vh - 300px);
            min-height: 250px;
            resize: vertical;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        
        /* Cấu trúc các nút bấm thao tác */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 5px;
        }
        .action-grid-full {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Nâng cấp thành 3 cột để chứa nút Dự thảo */
            gap: 8px;
            margin-top: 8px;
        }
        button {
            padding: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            color: white;
        }
        .btn-reformat { background: #3b82f6; }
        .btn-draft { background: #8b5cf6; }
        .btn-save-draft { background: #f59e0b; color: #fff; } /* Nút Lưu Dự Thảo */
        .btn-generate { background: #10b981; }
        .btn-reset { background: #ef4444; }
        .btn-search { background: var(--primary); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #statusBox {
            margin-top: 8px;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: center;
        }
        .status-loading { background: #e0f2fe; color: #0284c7; }
        .status-success { background: #dcfce7; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }
        
        .divider { margin: 10px 0; border-top: 1px dashed var(--border); }
        .search-flex { display: flex; gap: 5px; }
        .search-results { max-height: 150px; overflow-y: auto; padding: 0; list-style: none; margin-top: 5px; }
        .result-item { padding: 8px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; }
        .result-item a { text-decoration: none; font-weight: 600; color: var(--primary); }
        
        /* Responsive cơ bản */
        @media screen and (max-width: 600px) {
            .compact-header-grid { grid-template-columns: 1fr; }
            .action-grid-full { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" id="headerArea"></div>
        
        <input type="hidden" id="recordId" value="">

        <div class="compact-header-grid">
            <div class="form-group">
                <label>1. Chủ đề / Tên cuộc họp:</label>
                <input type="text" id="meetingTitle" placeholder="Ví dụ: Giao ban chuyên môn..." required>
            </div>
            <div class="form-group">
                <label>2. Thời gian:</label>
                <input type="datetime-local" id="meetingDate" required>
            </div>
            <div class="form-group">
                <label>3. Địa điểm:</label>
                <input type="text" id="location" placeholder="Phòng hội đồng..." required>
            </div>
            <div class="form-group">
                <label>4. Thành phần tham dự:</label>
                <input type="text" id="attendees" placeholder="BGH, Giáo viên..." required>
            </div>
        </div>

        <div class="content-group">
            <label style="color:var(--primary); font-size:1rem;">Nội dung diễn biến (Khung nhập thô):</label>
            <textarea id="rawContent" placeholder="Ghi chép nhanh các ý kiến thảo luận tại đây..."></textarea>
        </div>

        <div class="action-grid">
            <button id="btnReformat" class="btn-reformat" onclick="processAction('reformat')">Tạo lại bố cục bằng AI</button>
            <button id="btnDraft" class="btn-draft" onclick="processAction('draft')">AI Dự thảo Kết luận</button>
        </div>

        <div class="action-grid-full">
            <button id="btnSaveDraft" class="btn-save-draft" onclick="processAction('save_draft')">Lưu Dự Thảo</button>
            <button id="btnGenerate" class="btn-generate" onclick="processAction('generate')">Hoàn Thành & Ghi Sổ</button>
            <button id="btnReset" class="btn-reset" onclick="resetMeeting()">Chuyển cuộc họp mới</button>
        </div>

        <div id="statusBox" style="display:none;"></div>
        
        <div class="divider"></div>
        
        <div class="search-flex">
            <input type="text" id="searchKeyword" placeholder="Nhập từ khóa tìm biên bản (hoặc Dự thảo)..." onkeypress="handleSearchEnter(event)">
            <button id="btnSearch" class="btn-search" onclick="searchMeetingData()">Tìm kiếm</button>
        </div>
        <ul id="searchResults" class="search-results"></ul>
    </div>

    <script>
        window.searchResultsData = [];
        
        window.onload = function() {
            document.getElementById('headerArea').innerHTML = `
                <img src="${KET_NOI.LOGO_TRUONG}" alt="Logo">
                <h2>${KET_NOI.TEN_TO_CHUC}</h2>
                <h1>${KET_NOI.TIEU_DE_PHAN_MEM}</h1>
            `;
            setNow();
        };

        function setNow() {
            var now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('meetingDate').value = now.toISOString().slice(0,16);
        }

        function resetMeeting() {
            if(confirm("Xóa toàn bộ nội dung hiện tại để nhập biên bản mới?")) {
                document.getElementById('meetingTitle').value = '';
                document.getElementById('location').value = '';
                document.getElementById('attendees').value = '';
                document.getElementById('rawContent').value = '';
                document.getElementById('recordId').value = ''; /* Xóa ID định danh */
                document.getElementById('statusBox').style.display = 'none';
                setNow();
            }
        }

        function toggleButtons(state) {
            document.getElementById('btnReformat').disabled = state;
            document.getElementById('btnDraft').disabled = state;
            document.getElementById('btnSaveDraft').disabled = state;
            document.getElementById('btnGenerate').disabled = state;
            document.getElementById('btnReset').disabled = state;
            document.getElementById('btnSearch').disabled = state;
        }

        async function processAction(actionType) {
            const rawContentField = document.getElementById('rawContent');
            const statusBox = document.getElementById('statusBox');
            
            const payload = {
                action: actionType,
                recordId: document.getElementById('recordId').value, /* NÂNG CẤP 3: Gửi kèm ID để backend biết có cần ghi đè hay không */
                title: document.getElementById('meetingTitle').value,
                date: document.getElementById('meetingDate').value,
                location: document.getElementById('location').value,
                attendees: document.getElementById('attendees').value,
                rawContent: rawContentField.value,
                appName: KET_NOI.TIEU_DE_PHAN_MEM,
                orgName: KET_NOI.TEN_TO_CHUC,
                accountOperator: KET_NOI.CAN_BO_THAO_TAC
            };

            if(!payload.rawContent) {
                alert('Vui lòng nhập nội dung trước khi thực hiện thao tác!');
                return;
            }
            if((actionType === 'generate' || actionType === 'save_draft') && (!payload.title || !payload.location)) {
                alert('Vui lòng nhập đủ Chủ đề và Địa điểm cuộc họp để lưu!');
                return;
            }

            toggleButtons(true);
            statusBox.style.display = 'block';
            statusBox.className = 'status-loading';
            
            if (actionType === 'generate') {
                statusBox.innerHTML = payload.recordId ? 'Đang cập nhật & GHI ĐÈ dữ liệu vào Sổ...' : 'Đang nạp dữ liệu ghi NỐI TIẾP vào Sổ...';
            } else if (actionType === 'save_draft') {
                statusBox.innerHTML = 'Đang lưu bản Dự thảo vào Sổ...';
            } else {
                statusBox.innerHTML = 'Trợ lý AI đang xử lý văn bản...';
            }

            try {
                const response = await fetch(KET_NOI.URL_API_BACKEND, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if(result.status === 'success_doc') {
                    statusBox.className = 'status-success';
                    statusBox.innerHTML = `${result.message} <br><br> <a href="${result.url}" target="_blank" style="color:#166534; text-decoration:underline;">Mở Sổ Trực Tuyến</a>`;
                    /* NÂNG CẤP: Nếu backend trả về ID mới sau khi lưu dự thảo, gán vào recordId để khi ấn tiếp nó sẽ ghi đè */
                    if(result.recordId) {
                        document.getElementById('recordId').value = result.recordId;
                    }
                } else if (result.status === 'success_text') {
                    statusBox.className = 'status-success';
                    statusBox.innerHTML = 'AI đã xử lý xong. Vui lòng kiểm tra lại.';
                    if(actionType === 'reformat') {
                        rawContentField.value = result.text;
                    } else if (actionType === 'draft') {
                        rawContentField.value += "\n\n" + result.text;
                    }
                } else {
                    statusBox.className = 'status-error';
                    statusBox.innerHTML = `Lỗi từ máy chủ: ${result.message}`;
                }
            } catch (error) {
                statusBox.className = 'status-error';
                statusBox.innerHTML = `Lỗi kết nối. Chi tiết: ${error}`;
            } finally {
                toggleButtons(false);
            }
        }

        function handleSearchEnter(event) {
            if (event.key === "Enter") searchMeetingData();
        }

        async function searchMeetingData() {
            const keyword = document.getElementById('searchKeyword').value;
            const resultList = document.getElementById('searchResults');
            
            if(!keyword.trim()) {
                alert('Vui lòng nhập từ khóa!');
                return;
            }
            
            resultList.innerHTML = '<li class="result-item" style="justify-content:center; color:var(--primary);">Đang quét nội dung Sổ...</li>';
            toggleButtons(true);
            
            const payload = { action: 'search', keyword: keyword };
            
            try {
                const response = await fetch(KET_NOI.URL_API_BACKEND, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if(result.status === 'success_search') {
                    resultList.innerHTML = '';
                    if(result.data.length === 0) {
                        resultList.innerHTML = '<li class="result-item" style="color:var(--secondary);">Không tìm thấy.</li>';
                    } else {
                        window.searchResultsData = result.data;
                        result.data.forEach((item, index) => {
                            const li = document.createElement('li');
                            li.className = 'result-item';
                            li.innerHTML = `
                                <a href="javascript:void(0)" onclick="extractToForm(${index})">🔍 ${item.title}</a>
                                <span style="font-size: 0.85em; color: var(--secondary);">${item.date} (Click để nạp)</span>
                            `;
                            resultList.appendChild(li);
                        });
                    }
                } else {
                    resultList.innerHTML = `<li class="result-item" style="color:red;">Lỗi: ${result.message}</li>`;
                }
            } catch (error) {
                resultList.innerHTML = `<li class="result-item" style="color:red;">Lỗi kết nối.</li>`;
            } finally {
                toggleButtons(false);
            }
        }

        /* NÂNG CẤP 2: Bóc tách tự động dữ liệu vào đúng vị trí 4 ô, lọc trả lại nội dung sạch cho Textarea */
        function extractToForm(index) {
            if(window.searchResultsData && window.searchResultsData[index]) {
                const dataBlock = window.searchResultsData[index];
                
                // 1. Phục hồi Title cơ bản
                document.getElementById('meetingTitle').value = dataBlock.title || '';
                
                // 2. Thu thập văn bản gộp (nếu backend đẩy nguyên khối Document về)
                let fullContent = dataBlock.content || '';
                let extLocation = dataBlock.location || '';
                let extAttendees = dataBlock.attendees || '';
                
                // Dùng Regex quét các tham số bị dính trong văn bản (Dựa trên cấu trúc lưu từ Code.gs của đồng chí)
                const locMatch = fullContent.match(/2\.\s*Địa\s*điểm:\s*(.*)/i);
                if (locMatch && !extLocation) extLocation = locMatch[1].trim();
                
                const attMatch = fullContent.match(/3\.\s*Thành\s*phần\s*tham\s*dự:\s*(.*)/i);
                if (attMatch && !extAttendees) extAttendees = attMatch[1].trim();
                
                // 3. Cắt bỏ râu ria phần Header (từ đoạn "NỘI DUNG VÀ KẾT LUẬN" trở đi) để đưa lại nội dung gốc vào khung
                let pureContent = fullContent;
                const bodyParts = fullContent.split(/---\s*NỘI DUNG VÀ KẾT LUẬN\s*---/i);
                if (bodyParts.length > 1) {
                    pureContent = bodyParts[1].trim();
                }

                // 4. Đổ dữ liệu về đúng vị trí
                document.getElementById('location').value = extLocation;
                document.getElementById('attendees').value = extAttendees;
                document.getElementById('rawContent').value = pureContent;
                
                // 5. Nạp Record ID (nếu backend có gửi kèm index/id) để sẵn sàng tính năng GHI ĐÈ
                document.getElementById('recordId').value = dataBlock.id || index;

                const statusBox = document.getElementById('statusBox');
                statusBox.className = 'status-success';
                statusBox.innerHTML = 'Đã bóc tách Biên bản vào các trường. Sẵn sàng chỉnh sửa & Ghi đè!';
                statusBox.style.display = 'block';
                
                document.getElementById('rawContent').scrollIntoView({ behavior: "smooth", block: "center" });
            }
        }
    </script>
</body>
</html>
